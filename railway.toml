# Railway deployment config. See https://docs.railway.app/reference/config-as-code
#
# DATABASE_URL, ODDS_API_KEY, SECRET_KEY, FLASK_ENV=production, and
# FLASK_APP=wsgi.py must be set as environment variables in the Railway
# dashboard. Never commit them.

[build]
builder = "NIXPACKS"

[deploy]
# predeployCommand runs after build, before the new release takes traffic.
# This is where `flask db upgrade` belongs — it needs runtime env vars
# (DATABASE_URL), which are NOT available at build time.
predeployCommand = "flask db upgrade"
startCommand = "gunicorn wsgi:app --workers 2 --timeout 60 --log-file -"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway deployment config. See https://docs.railway.app/reference/config-as-code
#
# DATABASE_URL, ODDS_API_KEY, SECRET_KEY, FLASK_ENV=production, and
# FLASK_APP=wsgi.py must be set as environment variables in the Railway
# dashboard. Never commit them.
#
# startCommand is intentionally NOT set here: this repo deploys two services
# in the same Railway project (web + cron) with different start commands.
# Each service sets its own Custom Start Command in the Railway UI:
#   web:  gunicorn wsgi:app --workers 2 --timeout 60 --log-file -
#   cron: python scripts/refresh_odds.py

[build]
builder = "NIXPACKS"

[deploy]
predeployCommand = "flask db upgrade"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
